name: Build

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  MINVERBUILDMETADATA: build.${{github.run_number}}

jobs:
  build:
    name: Build-${{matrix.os}}
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Dotnet Restore
        run: dotnet restore hangfire-mcp-dotnet.slnx
        shell: pwsh

      - name: Dotnet Build
        run: dotnet build hangfire-mcp-dotnet.slnx --configuration Release --no-restore -p:WarningLevel=0 /clp:ErrorsOnly
        shell: pwsh

      - name: Dotnet Test
        run: >
          dotnet test hangfire-mcp-dotnet.slnx
          --configuration Release --no-build
          --logger "trx"
          --logger "GitHubActions;summary.includePassedTests=false;summary.includeSkippedTests=true"
          --results-directory ./Artefacts
          --collect:"XPlat Code Coverage"
        shell: pwsh

      - name: Generate Coverage Report
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator -reports:./Artefacts/**/coverage.cobertura.xml -targetdir:./Artefacts/coverage-report -reporttypes:"HtmlInline;MarkdownSummaryGithub;Cobertura"
        shell: pwsh

      - name: Publish Coverage Summary
        if: matrix.os == 'ubuntu-latest'
        run: cat ./Artefacts/coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
        shell: bash

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{matrix.os}}
          path: ./Artefacts
          if-no-files-found: ignore

  pack:
    name: Pack
    needs: build
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Dotnet Restore
        run: dotnet restore hangfire-mcp-dotnet.slnx

      - name: Dotnet Pack (Library)
        run: >
          dotnet pack src/Nall.Hangfire.Mcp/Nall.Hangfire.Mcp.csproj
          --configuration Release --no-restore --output ./Artefacts
          -p:WarningLevel=0 /clp:ErrorsOnly

      - name: Dotnet Pack (Generator)
        run: >
          dotnet pack src/Nall.Hangfire.Mcp.Generator/Nall.Hangfire.Mcp.Generator.csproj
          --configuration Release --no-restore --output ./Artefacts
          -p:WarningLevel=0 /clp:ErrorsOnly

      - name: Upload Packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./Artefacts/*.nupkg

  push-nuget:
    name: Push NuGet
    needs: pack
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: NuGet
      url: https://www.nuget.org/packages/Nall.Hangfire.Mcp
    steps:
      - name: Download Packages
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: ./Artefacts

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Dotnet NuGet Push
        run: >
          dotnet nuget push ./Artefacts/*.nupkg
          --source https://api.nuget.org/v3/index.json
          --api-key ${{ secrets.NUGET_API_KEY }}
          --skip-duplicate
