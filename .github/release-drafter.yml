name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
tag-prefix: v

categories:
  - title: Breaking Changes
    labels:
      - breaking
      - major
  - title: Features
    labels:
      - feature
      - enhancement
  - title: Bug Fixes
    labels:
      - bug
      - fix
  - title: Maintenance
    labels:
      - chore
      - refactor
      - dependencies
  - title: Documentation
    labels:
      - documentation
      - docs

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'
no-changes-template: '- No user-facing changes.'

version-resolver:
  major:
    labels:
      - breaking
      - major
  minor:
    labels:
      - feature
      - enhancement
      - minor
  patch:
    labels:
      - bug
      - fix
      - chore
      - documentation
      - dependencies
      - patch
  default: patch

autolabeler:
  - label: documentation
    files:
      - '**/*.md'
      - 'docs/**/*'
  - label: dependencies
    files:
      - '**/*.csproj'
      - 'global.json'
      - 'Directory.*.props'
  - label: feature
    title:
      - '/^feat(\(.+\))?:/i'
  - label: bug
    title:
      - '/^fix(\(.+\))?:/i'
  - label: chore
    title:
      - '/^chore(\(.+\))?:/i'
      - '/^refactor(\(.+\))?:/i'
  - label: breaking
    title:
      - '/!:/'

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/NikiforovAll/hangfire-mcp-dotnet/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
